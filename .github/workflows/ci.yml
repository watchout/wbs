name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Lint
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

  # ============================================================
  # Type Check
  # ============================================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

  # ============================================================
  # Tests with Coverage and Performance Monitoring
  # ============================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: wbs_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    env:
      # Test environment variables
      DATABASE_URL: postgresql://test:test@localhost:5432/wbs_test
      NUXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
      NUXT_PUBLIC_SUPABASE_KEY: test-key
      NUXT_SUPABASE_SERVICE_KEY: test-service-key
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_test_placeholder
      SESSION_PASSWORD: test-session-password-32-chars-long
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup database
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        if: success()
        run: npm run test:coverage
        
      - name: Check coverage threshold
        if: success()
        run: |
          # Parse coverage output from the test run and check threshold
          if [ -f coverage/coverage-summary.json ]; then
            # Extract lines coverage from JSON
            coverage=$(node -e "console.log(Math.round(require('./coverage/coverage-summary.json').total.lines.pct))")
            echo "📊 Coverage: ${coverage}%"
            if [ ${coverage} -lt 15 ]; then
              echo "❌ Coverage is ${coverage}%, which is below the 15% threshold"
              exit 1
            fi
            echo "✅ Coverage is ${coverage}%, meeting the 15% threshold"
          else
            echo "⚠️ Coverage report not found"
          fi

      - name: Analyze test execution time
        if: always()
        run: |
          npm run test:perf || true

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ============================================================
  # Build Check
  # ============================================================
  build:
    name: Build Check
    runs-on: ubuntu-latest
    env:
      # Build environment variables (dummy values for build check)
      NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY || 'placeholder-key' }}
      NUXT_SUPABASE_SERVICE_KEY: ${{ secrets.NUXT_SUPABASE_SERVICE_KEY || 'placeholder-service-key' }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_placeholder' }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_placeholder' }}
      SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD || 'test-session-password-32-chars-long-for-build' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Nuxt build
        run: npm run build
