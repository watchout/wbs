name: Final Audit

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  # ============================================================
  # Guard: CI must have passed
  # ============================================================
  guard:
    name: Guard — CI passed
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    outputs:
      pr_number: ${{ steps.find_pr.outputs.pr_number }}
    steps:
      - name: Find associated PR
        id: find_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --json number \
            --jq '.[0].number // empty')
          
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for branch $BRANCH — skipping"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

  # ============================================================
  # Phase 1: Breaking Changes Check
  # ============================================================
  breaking-changes:
    name: Phase 1 — Breaking Changes
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.pr_number != ''
    steps:
      - uses: actions/checkout@v4

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.event.workflow_run.pull_requests[0].base.ref || 'main' }}

      - name: Check for breaking changes
        id: breaking
        run: |
          echo "✅ No breaking changes detection configured yet" >> breaking_report.txt
          cat breaking_report.txt

      - name: Upload breaking changes report
        uses: actions/upload-artifact@v4
        with:
          name: breaking-changes-report
          path: breaking_report.txt

  # ============================================================
  # Finalize
  # ============================================================
  finalize:
    name: Finalize Audit
    runs-on: ubuntu-latest
    needs: [guard, breaking-changes]
    if: needs.guard.outputs.pr_number != ''
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Add audit-passed label
        run: |
          PR="${{ needs.guard.outputs.pr_number }}"
          gh pr edit "$PR" \
            --repo "${{ github.repository }}" \
            --add-label "audit-passed"
          echo "✅ Added 'audit-passed' label to PR #$PR"
